name: Link check

on:
  schedule:
    # Weekly, Mondays 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  links:
    name: Verify all resource URLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check all resource URLs
        run: node scripts/check-links.mjs

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('broken-links.json', 'utf8');
            } catch (e) {
              report = '_(no report file found — see workflow logs)_';
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Broken links detected — ${new Date().toISOString().slice(0, 10)}`,
              body: `The weekly link check found broken URLs.\n\n\`\`\`json\n${report}\n\`\`\``,
              labels: ['broken-link', 'automated'],
            });
